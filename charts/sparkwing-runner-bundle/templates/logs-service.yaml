{{- if .Values.logs.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sparkwing-runner-bundle.logs.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sparkwing-runner-bundle.componentLabels" (dict "root" . "component" "logs") | nindent 4 }}
spec:
  type: {{ .Values.logs.service.type }}
  selector:
    {{- include "sparkwing-runner-bundle.componentSelectorLabels" (dict "root" . "component" "logs") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.logs.service.port }}
      targetPort: {{ .Values.logs.service.targetPort }}
{{- end }}
