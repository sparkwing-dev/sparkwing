{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sparkwing-full.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sparkwing-full.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
