apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sparkwing-full.web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sparkwing-full.componentLabels" (dict "root" . "component" "web") | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  # Web is stateless (proxies to the controller; SPA bundle is
  # baked into the binary). RollingUpdate is fine.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "sparkwing-full.componentSelectorLabels" (dict "root" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sparkwing-full.componentSelectorLabels" (dict "root" . "component" "web") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "sparkwing-full.image" (dict "img" .Values.web.image "root" .) | quote }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["/usr/local/bin/sparkwing-web"]
          args:
            - {{ printf "--addr=0.0.0.0:%d" (int .Values.web.port) | quote }}
            - {{ printf "--controller=%s" (include "sparkwing-full.web.controllerURL" .) | quote }}
            {{- $logsURL := include "sparkwing-full.web.logsURL" . }}
            {{- if $logsURL }}
            - {{ printf "--logs=%s" $logsURL | quote }}
            {{- end }}
            {{- if .Values.web.apiUrl }}
            - {{ printf "--api-url=%s" .Values.web.apiUrl | quote }}
            {{- end }}
            {{- if .Values.web.requireLogin }}
            - "--require-login"
            {{- end }}
          env:
            # runWeb() -> orchestrator.DefaultPaths() mkdir's
            # SPARKWING_HOME at startup; runAsUser 65534 can't
            # write to "/", so point it at a writable scratch
            # volume.
            - name: SPARKWING_HOME
              value: /tmp/sparkwing
            {{- if .Values.web.tokenSecret.name }}
            # Service-principal bearer token. Web proxies every
            # /api/v1/* request to the controller with this token
            # stamped, so it must carry the union of scopes the
            # dashboard's SPA ever triggers.
            - name: SPARKWING_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.tokenSecret.name | quote }}
                  key: {{ .Values.web.tokenSecret.key | quote }}
                  optional: true
            {{- end }}
            - name: OTEL_SERVICE_NAME
              value: "sparkwing-web"
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          volumeMounts:
            - name: sparkwing-home
              mountPath: /tmp/sparkwing
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: sparkwing-home
          emptyDir: {}
