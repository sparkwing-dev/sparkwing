# Example GitHub Actions workflow that runs a sparkwing pipeline in
# ci-embedded mode. Cache and logs go to S3 so a dashboard elsewhere
# can replay the run.
#
# Setup:
# 1. Add AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY repository secrets
#    with permissions to PUT/GET/DELETE on the bucket.
# 2. Declare the GHA bucket in .sparkwing/backends.yaml:
#
#      environments:
#        gha:
#          detect: { env_var: GITHUB_ACTIONS, equals: "true" }
#          cache: { type: s3, bucket: my-team-sparkwing, prefix: cache/ }
#          logs:  { type: s3, bucket: my-team-sparkwing, prefix: logs/  }
#
#    The built-in `gha` detect rule fires automatically; the entry
#    above contributes the surfaces.
# 3. Make sure your repo has a .sparkwing/ directory with the
#    pipeline you want to run (e.g. release-prod).

name: ci-embedded
on:
  push:
    branches: [main]
  pull_request:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install sparkwing CLI
        run: curl -fsSL https://sparkwing.dev/install.sh | bash

      - name: Run release pipeline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-west-2
          # Skip sparks resolution at run time -- trust the committed
          # .resolved.mod overlay. Refresh by running
          # `sparkwing pipeline sparks update` locally and committing
          # the diff; the publish step picks up the new versions on
          # next push.
          SPARKWING_NO_SPARKS_RESOLVE: "1"
        run: sparkwing run release-prod --mode=ci-embedded --workers=4
