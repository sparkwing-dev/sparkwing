# The sparkwing registry for the public sparkwing repo. Every entry is a
# Go struct registered via sparkwing.Register(...) in jobs/ that
# `sparkwing run` can invoke.
#
# This .sparkwing/ tree is intentionally minimal: it covers the
# build / lint / test / static-analysis / release pipelines that
# operate on this repo's OSS surface (SDK, CLI, embedded docs).
pipelines:
  # pre-commit: fast local gate (gofmt + go vet on .sparkwing/, repo-
  # wide regex sweeps for em dashes and internal tracker IDs). Fires
  # automatically after `sparkwing pipeline hooks install`.
  - name: pre-commit
    entrypoint: PreCommit
    on:
      pre_commit: {}

  # pre-push: heavier last gate before main. Full golangci-lint,
  # `go test -race`, govulncheck, version-freshness check, and a
  # hard refusal to push if any committed go.mod has a `replace`.
  - name: pre-push
    entrypoint: PrePush
    on:
      pre_push: {}

  - name: lint
    entrypoint: Lint

  - name: test
    entrypoint: Test

  - name: static-analysis
    entrypoint: StaticAnalysis

  # integration: spins up Postgres + MinIO in Docker, waits for them to
  # be ready (Verify gate), runs the env-gated integration suite against
  # them, and tears the containers down. Requires Docker + go.
  - name: integration
    entrypoint: Integration

  - name: build
    entrypoint: Build

  # build-images: builds one Docker image per deployable component
  # (controller, web, logs, cache, runner). Local single-arch by
  # default; --registry + --push switches to multi-arch buildx push.
  # Downstream consumers parse the final RELEASE_IMAGES summary line.
  - name: build-images
    entrypoint: BuildImages

  # release: cuts a sparkwing tag and pushes it. The
  # .github/workflows/release.yaml workflow takes over from the tag
  # push to publish binaries to GH Releases and multi-arch images to
  # GHCR. This pipeline deliberately does NOT duplicate that work --
  # its job is just to validate the release shape (clean tree, free
  # tag, non-empty CHANGELOG [Unreleased]) and push the tag.
  - name: release
    entrypoint: Release

  # example: reference pipeline that exercises the two-layer
  # Plan/Work model -- a Plan with two Nodes where the first Node's
  # Work mixes a sequential chain with a parallel group. Anyone
  # checking out the repo can `sparkwing run example` to see the SDK shape
  # render in the dashboard.
  - name: example
    entrypoint: Example

  # weather-report: tiny standalone pipeline the example calls via
  # sparkwing.RunAndAwait to exercise cross-pipeline dependencies.
  - name: weather-report
    entrypoint: WeatherReport
