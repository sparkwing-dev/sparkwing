# The wing registry for the public sparkwing repo. Every entry is a
# Go struct registered via sparkwing.Register(...) in jobs/ that wing
# can invoke.
#
# This .sparkwing/ tree is intentionally minimal: it exists so the
# platform release-all (in the sibling sparkwing-platform repo) can
# cross-reference build / lint / test / static-analysis / release
# pipelines that operate on the public OSS surface (SDK, CLI,
# embedded docs). The bulk of orchestration -- release-all, deploy,
# consumer bumps -- still lives in sparkwing-platform/.sparkwing/.
pipelines:
  - name: lint
    entrypoint: Lint
    group: CI
    tags: [ci, checks]

  - name: test
    entrypoint: Test
    group: CI
    tags: [ci, checks]

  - name: static-analysis
    entrypoint: StaticAnalysis
    group: CI
    tags: [ci, checks]

  - name: build
    entrypoint: Build
    group: Build
    tags: [build]

  # release: cuts a sparkwing tag and pushes it. The
  # .github/workflows/release.yaml workflow takes over from the tag
  # push to publish binaries to GH Releases and multi-arch images to
  # GHCR (see ISS-046 / ISS-052). This pipeline deliberately does
  # NOT duplicate that work -- its job is just to validate the
  # release shape (clean tree, free tag, CHANGELOG entry) and push
  # the tag.
  - name: release
    entrypoint: Release
    group: Release
    tags: [release]
