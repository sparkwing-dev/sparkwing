# The wing registry for the public sparkwing repo. Every entry is a
# Go struct registered via sparkwing.Register(...) in jobs/ that wing
# can invoke.
#
# This .sparkwing/ tree is intentionally minimal: it covers the
# build / lint / test / static-analysis / release pipelines that
# operate on this repo's OSS surface (SDK, CLI, embedded docs).
pipelines:
  - name: lint
    entrypoint: Lint
    group: CI
    tags: [ci, checks]

  - name: test
    entrypoint: Test
    group: CI
    tags: [ci, checks]

  - name: static-analysis
    entrypoint: StaticAnalysis
    group: CI
    tags: [ci, checks]

  - name: build
    entrypoint: Build
    group: Build
    tags: [build]

  # release: cuts a sparkwing tag and pushes it. The
  # .github/workflows/release.yaml workflow takes over from the tag
  # push to publish binaries to GH Releases and multi-arch images to
  # GHCR. This pipeline deliberately does
  # NOT duplicate that work -- its job is just to validate the
  # release shape (clean tree, free tag) and push the tag. Release
  # notes come from the GH-Actions workflow's `gh release create
  # --generate-notes`, not a hand-curated CHANGELOG.
  - name: release
    entrypoint: Release
    group: Release
    tags: [release]

  # example: reference pipeline that exercises the two-layer
  # Plan/Work model -- a Plan with two Nodes where the first Node's
  # Work mixes a sequential chain with a parallel group. Anyone
  # checking out the repo can `wing example` to see the SDK shape
  # render in the dashboard.
  - name: example
    entrypoint: Example
    group: Examples
    tags: [example, docs]

  # weather-report: tiny standalone pipeline the example calls via
  # sparkwing.RunAndAwait to exercise cross-pipeline dependencies.
  # Hidden from tab-complete; still invokable directly.
  - name: weather-report
    entrypoint: WeatherReport
    group: Examples
    hidden: true
    tags: [example]
