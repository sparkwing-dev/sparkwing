# golangci-lint v2 configuration.
# Run: golangci-lint run ./...
#
# The rule set is a balance between catching real bugs (staticcheck,
# errcheck, errorlint, bodyclose) and avoiding noise on legitimate
# patterns (no gosec, no godot, no fieldalignment). Trimmed to what
# the elite Go repos converge on per RESEARCH-elite-comparison.md.

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bidichk # CVE-2021-42574 Trojan Source defense
    - bodyclose # missing http response body Close()
    - copyloopvar # loop-variable capture bugs (Go 1.22+ semantics)
    - depguard # banned imports (deprecated / wrong-version modules)
    - errcheck # unchecked error returns
    - errorlint # %w wrapping + errors.Is/As discipline
    - forbidigo # banned function calls (panic / os.Exit outside main)
    - govet # default vet + extras enabled below
    - ineffassign # assignments whose value is never read
    - misspell # common english spelling errors
    - nolintlint # stale / malformed nolint directives
    - staticcheck # SA + S + ST + QF rule families
    - unconvert # redundant type conversions
    - usestdlibvars # use stdlib constants (http.StatusOK over 200)
  settings:
    govet:
      enable-all: true
      disable:
        # fieldalignment is mechanical but rarely affects performance
        # meaningfully and produces large noisy reorderings.
        - fieldalignment
        # shadow is legitimate often enough that the noise outweighs
        # the catches; readers can disambiguate.
        - shadow
    staticcheck:
      checks:
        - all
        # Stylistic suggestions about formatting that we have own opinions on.
        - -QF1001
        - -QF1002
        - -QF1003
        - -QF1004
        - -QF1005
        - -QF1006
        - -QF1007
        - -QF1008
        - -QF1009
        - -QF1010
        - -QF1011
        - -QF1012
        # ST1000 / ST1020 / ST1021 require godoc on every package /
        # exported func / exported type; useful in libraries but a lot
        # of legitimate internal code doesn't justify it. Enable in
        # public-SDK config separately if desired.
        - -ST1000
        - -ST1020
        - -ST1021
    errcheck:
      exclude-functions:
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    misspell:
      locale: US
      ignore-rules:
        # `Cancelled` is the public Outcome constant in sparkwing/outcome.go
        # and `"cancelled"` is its persisted string value. Renaming would
        # be a breaking API + schema change.
        - cancelled
        - cancelling
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    depguard:
      rules:
        main:
          deny:
            - pkg: io/ioutil
              desc: "io/ioutil is deprecated since Go 1.16; use io and os."
            - pkg: github.com/pkg/errors
              desc: "use stdlib errors with %w wrapping; errors.Is/As replaces pkg/errors.Cause/As."
            - pkg: gopkg.in/yaml.v2
              desc: "use gopkg.in/yaml.v3; v2 is unmaintained and has known issues with anchor handling."
            - pkg: github.com/stretchr/testify/assert
              desc: "use testify/require instead so a failed assertion stops the test (assert keeps going and produces follow-on noise)."

        # The dispatch engine (internal/orchestrator) is heavy: it pulls in
        # the run/node executor, the local trigger consumer, the runner
        # pool, and the bin compile cache. Only binaries that actually
        # run pipelines should link against it. Thin binaries
        # (sparkwing-logs, sparkwing-web, sparkwing-cache,
        # sparkwing-controller's entry) and the read-only dashboard
        # support packages (internal/backend, internal/web) need only
        # the file-layout helpers (internal/paths) and the log renderer
        # (internal/logpretty); pulling in internal/orchestrator drags
        # in megabytes of unrelated code and slows the build.
        #
        # If a new dependency on the dispatch engine is actually
        # necessary, prefer extracting the shared concern to its own
        # leaf package (mirror the paths / logpretty split) over
        # weakening this rule.
        thin-binaries-no-dispatch:
          list-mode: lax
          files:
            - "**/cmd/sparkwing-logs/**"
            - "**/cmd/sparkwing-web/**"
            - "**/cmd/sparkwing-cache/**"
            - "**/cmd/sparkwing-controller/**"
            - "**/internal/backend/**"
            - "**/internal/web/**"
            # Tests legitimately exercise the orchestrator -- e.g.
            # internal/web/server_test.go runs a real pipeline to
            # verify log rendering. The rule guards production
            # binary size and arch, not test setup code.
            - "!**/*_test.go"
          deny:
            - pkg: github.com/sparkwing-dev/sparkwing/internal/orchestrator
              desc: "Thin binaries and the dashboard support packages must not import internal/orchestrator (the dispatch engine). Use internal/paths for file-layout helpers and internal/logpretty for log rendering. If you genuinely need a new orchestrator symbol here, extract it to its own leaf package first."

        # The public SDK is the contract users build pipelines
        # against. Importing internal/* from it would ship internal
        # types into every consumer repo's build graph. The single
        # legitimate exception is internal/swtags (struct-tag
        # helpers used by the SDK's flag parsing).
        sdk-no-internal:
          list-mode: lax
          # Match only the top-level SDK package files (./sparkwing/*.go),
          # not cmd/sparkwing/ or any other path that happens to contain
          # the word "sparkwing". The negation rules exclude the CLI
          # binary subtree (cmd/sparkwing*) and tests.
          files:
            - "sparkwing/*.go"
            - "!**/cmd/**"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/sparkwing-dev/sparkwing/internal
              desc: "The public sparkwing SDK package cannot import internal/* packages. Anything the SDK needs at the surface either belongs in the SDK itself or in pkg/."
          # swtags is an internal helper the SDK already legitimately
          # depends on for flag-tag parsing; carve it out explicitly
          # so the rule is enforceable without re-architecting.
          allow:
            - $gostd
            - github.com/sparkwing-dev/sparkwing/internal/swtags

        # pkg/store is the foundation data layer. If it grows imports
        # of internal/*, it inverts the layering -- consumers (the
        # orchestrator, the controller) depend on store, not the
        # other way around.
        store-no-internal:
          list-mode: lax
          files:
            - "**/pkg/store/**"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/sparkwing-dev/sparkwing/internal
              desc: "pkg/store is the data foundation; internal/* packages depend on it, not the reverse. If pkg/store needs a helper currently in internal/, lift it to pkg/ or inline it."

        # pkg/backends owns the backends.yaml schema -- config types
        # only. Storage / store / controller implementations consume
        # the config; the config doesn't reach back into them.
        backends-no-impls:
          list-mode: lax
          files:
            - "**/pkg/backends/**"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/sparkwing-dev/sparkwing/pkg/storage
              desc: "pkg/backends is config-type only; pkg/storage consumes the config, not the reverse. Factory wiring lives in pkg/storage/storeurl."
            - pkg: github.com/sparkwing-dev/sparkwing/pkg/store
              desc: "pkg/backends is config-type only. State-store implementations belong in pkg/store or pkg/storage/storeurl."
            - pkg: github.com/sparkwing-dev/sparkwing/pkg/controller
              desc: "pkg/backends declares the controller backend type; the controller implementation must not bleed in here."
            - pkg: github.com/sparkwing-dev/sparkwing/pkg/logs
              desc: "pkg/backends declares log backend types only; log-service implementation must not bleed in here."

        # The warm-runner pool's machinery (internal/cluster +
        # internal/runners/*) is sparkwing-runner-only. If a different
        # binary needs a piece of it, lift the piece to its own
        # neutral package instead of widening the cluster surface.
        cluster-runner-only:
          list-mode: lax
          files:
            - "**"
            - "!**/cmd/sparkwing-runner/**"
            - "!**/internal/cluster/**"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/sparkwing-dev/sparkwing/internal/cluster
              desc: "internal/cluster is the warm-runner pool's implementation; only cmd/sparkwing-runner should import it. Other binaries that need a shared concept should consume it through a neutral package."

        cache-binary-only:
          list-mode: lax
          files:
            - "**"
            - "!**/cmd/sparkwing-cache/**"
            - "!**/internal/cache/**"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/sparkwing-dev/sparkwing/internal/cache
              desc: "internal/cache is the sparkwing-cache HTTP server's implementation; only cmd/sparkwing-cache should import it."

        runners-cluster-only:
          list-mode: lax
          files:
            - "**"
            - "!**/internal/cluster/**"
            - "!**/internal/runners/**"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/sparkwing-dev/sparkwing/internal/runners
              desc: "internal/runners/* are the warm-runner pool's per-runtime backends (k8s, warmpool). Only internal/cluster (the pool itself) should import them."
    forbidigo:
      # Each `forbid` pattern fires on call sites by default; analyze-types=false
      # keeps the rule focused on textual matches (no need to load full type info).
      exclude-godoc-examples: true
      analyze-types: false
      forbid:
        - pattern: ^panic$
          msg: "panic() in library code is a hard crash; return an error and let the caller decide. Allowed in cmd/**/main.go and _test.go (see exclusions)."
        - pattern: ^os\.Exit$
          msg: "os.Exit short-circuits deferred cleanup; return an error from main or use orchestrator-managed shutdown. Allowed in cmd/**/main.go (see exclusions)."
        - pattern: ^fmt\.Println$
          msg: "fmt.Println bypasses the structured logger; use sparkwing.Info/Error or slog directly. Allowed in cmd/**/main.go and _test.go (see exclusions)."
  exclusions:
    rules:
      # Tests often ignore errors deliberately.
      - path: _test\.go
        linters:
          - errcheck
      # Tests can panic / Println / os.Exit as part of their style.
      - path: _test\.go
        linters:
          - forbidigo
      # CLI binary subtrees legitimately do panic / os.Exit /
      # fmt.Println at the process boundary. The forbidigo bans
      # target library code, not the binary entry points. Two
      # patterns: cmd/ for the conventional layout and any file
      # literally named main.go (covers `internal/orchestrator/main.go`
      # and similar entry-point shims).
      - path: cmd/
        linters:
          - forbidigo
      - path: (^|/)main\.go$
        linters:
          - forbidigo
      # SDK root package convention: the public sparkwing/ package
      # uses panic() at Plan / Register / Cache / GroupJobs time as
      # programmer-error guards (caller passed an invalid argument
      # at construction). This is the explicit SDK contract: panic
      # loud at test time rather than carry the invalid plan into
      # dispatch. The whole sparkwing/*.go set lives under this
      # convention; the subpackages (sparkwing/planguard/, etc.)
      # are covered by their own entries or follow the same rule.
      # `forbidigo` still gates the rest of the tree (internal/,
      # pkg/, cmd/<not-main>/).
      - path: ^sparkwing/[^/]+\.go$
        linters:
          - forbidigo
      - path: sparkwing/planguard/
        linters:
          - forbidigo
      # Generated code should be left alone.
      - path: \.pb\.go$
        linters:
          - all
      - source: "^// Code generated"
        linters:
          - all

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/sparkwing-dev
